name: Update Vinyl Picks

on:
  schedule:
    - cron: '0 9 1 * *'   # Runs at 9am on the 1st of every month
    # To switch to weekly (every Monday at 9am), replace the line above with:
    # - cron: '0 9 * * 1'
  workflow_dispatch:       # Allows you to trigger this manually from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generate.py
        run: python generate.py

      - name: Commit and push picks.json and state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks.json state.json
          git diff --staged --quiet || git commit -m "🎵 Monthly vinyl picks update"
          git push